<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark" id="form-title">Welcome Back</h3>
                    <p class="text-muted small" id="form-subtitle">Please sign in to continue shopping</p>
                </div>

                <div class="alert alert-danger d-none" id="auth-alert"></div>

                <form id="auth-form">
                    <div class="mb-3 d-none" id="name-group">
                        <label class="form-label small fw-semibold">Full Name</label>
                        <input type="text" class="form-control" id="auth-name" placeholder="John Doe">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email Address</label>
                        <input type="email" class="form-control" id="auth-email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password</label>
                        <input type="password" class="form-control" id="auth-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 fw-semibold mb-3" id="submit-btn">Sign In</button>
                    
                    <div class="text-center">
                        <span class="text-muted small" id="toggle-text">New customer?</span>
                        <a href="#" class="small fw-bold text-decoration-none ms-1" id="toggle-link">Create account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
