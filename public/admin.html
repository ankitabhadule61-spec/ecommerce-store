<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">📦 QuickShop Administrative Management Terminal</span>
            <a class="btn btn-outline-light btn-sm" href="login.html" onclick="localStorage.removeItem('shop_user')">Logout</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="card p-4 shadow-sm border-0 position-sticky" style="top: 20px;">
                    <h5 class="fw-bold mb-3 text-danger" id="form-action-title">Inventory Management Add</h5>
                    <form id="add-product-form">
                        <input type="hidden" id="p-edit-id" value="">
                        
                        <div class="mb-2"><label class="small fw-semibold">Title Name</label><input type="text" class="form-control form-control-sm" id="p-name" required></div>
                        <div class="mb-2"><label class="small fw-semibold">Price ($)</label><input type="number" step="0.01" class="form-control form-control-sm" id="p-price" required></div>
                        <div class="mb-2"><label class="small fw-semibold">Category Type</label><input type="text" class="form-control form-control-sm" id="p-category" required></div>
                        <div class="mb-2"><label class="small fw-semibold">Stock Initial Unit</label><input type="number" class="form-control form-control-sm" id="p-stock" required></div>
                        <div class="mb-2"><label class="small fw-semibold">Image Asset Link</label><input type="text" class="form-control form-control-sm" id="p-image" value="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"></div>
                        <div class="mb-3"><label class="small fw-semibold">Description Text</label><textarea class="form-control form-control-sm" id="p-desc" rows="2" required></textarea></div>
                        
                        <button type="submit" id="submit-btn" class="btn btn-danger btn-sm w-100 fw-bold">Publish Item Document</button>
                        <button type="button" id="cancel-edit-btn" class="btn btn-outline-secondary btn-sm w-100 fw-bold mt-2 d-none" onclick="clearEditState()">Cancel Editing</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                
                <div class="card p-4 shadow-sm border-0 mb-4">
                    <h5 class="fw-bold mb-3 text-dark">Live Storefront Inventory</h5>
                    <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                        <table class="table table-hover align-middle small">
                            <box-header></box-header>
                            <thead class="table-dark">
                                <tr>
                                    <th>Image</th>
                                    <th>Product Details</th>
                                    <th>Price</th>
                                    <th>Stock Left</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-inventory-log">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="card p-4 shadow-sm border-0">
                    <h5 class="fw-bold mb-3">Active Customer Order Systems Tracking Log</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle small">
                            <thead class="table-dark">
                                <tr>
                                    <th>Order Reference Identifier</th>
                                    <th>Buyer Profile</th>
                                    <th>Billing Cost</th>
                                    <th>Fulfillment State Status</th>
                                    <th>Action Update</th>
                                </tr>
                            </thead>
                            <tbody id="admin-orders-log">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
